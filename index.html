<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jadir Brito | Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=Inter:wght@300;400;600;700&display=swap');
        
        body { background-color: #ffffff; font-family: 'Inter', sans-serif; color: #1a1a1a; -webkit-user-select: none; user-select: none; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; letter-spacing: -0.02em; }
        header { background: #000000; color: white; }
        .hero-section { background-color: #f9f9f9; padding: 60px 0; border-bottom: 1px solid #eee; }
        
        #artigo-texto p { line-height: 1.8; margin-bottom: 1.5rem; color: #2d3748; }
        .img-container { width: 100%; max-width: 700px; margin: 0 auto; }

        /* Estilo para o Card da Home */
        .card-home { transition: 0.3s; cursor: pointer; border-bottom: 1px solid #eee; padding-bottom: 2rem; }
        .card-home:hover { opacity: 0.8; }
        .resumo-texto { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; color: #4a5568; }

        /* Estilo do Slider Interno */
        .slider-container { position: relative; width: 100%; overflow: hidden; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin: 2.5rem 0; background: #eee; }
        .slider-track { display: flex; transition: transform 0.6s ease-in-out; }
        .slide { min-width: 100%; }
        .slide img { width: 100%; height: auto; display: block; object-fit: cover; }

        /* Estilo do Mural Gigante */
        .mural-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin-top: 2rem; }
        .mural-item { aspect-ratio: 1 / 1; overflow: hidden; cursor: pointer; border-radius: 4px; transition: transform 0.3s; }
        .mural-item:hover { transform: scale(1.05); }
        .mural-item img { width: 100%; height: 100%; object-fit: cover; }

        /* Janela da Foto Grande (Modal) */
        #foto-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; padding: 20px; cursor: pointer; }
        #foto-modal img { max-width: 100%; max-height: 90vh; border-radius: 4px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }

        .whatsapp-float { position: fixed; width: 60px; height: 60px; bottom: 20px; right: 20px; background-color: #25d366; color: #FFF; border-radius: 50px; display: flex; align-items: center; justify-content: center; box-shadow: 2px 2px 15px rgba(0,0,0,0.3); z-index: 1000; }
        footer { background: #000000; color: #ffffff; }
        .input-footer { background: #f4f4f4; border: 1px solid #ddd; padding: 10px 12px; border-radius: 4px; width: 100%; margin-bottom: 8px; color: black; }
        .btn-footer { background-color: #16a34a; color: white; font-weight: 700; width: 100%; border-radius: 4px; text-transform: uppercase; }
        .btn-share { display: inline-flex; align-items: center; gap: 8px; background-color: #1a202c; color: white; padding: 10px 20px; border-radius: 5px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <header class="py-5 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <a href="index.html" class="text-xl font-black tracking-widest uppercase italic">JADIR BRITO</a>
            <div id="btn-voltar" class="hidden">
                <a href="index.html" class="text-sm font-bold border border-white px-4 py-1 hover:bg-white hover:text-black transition uppercase">Voltar</a>
            </div>
        </div>
    </header>

    <div id="view-home" class="container mx-auto max-w-4xl px-6 py-12"></div>

    <div id="view-artigo" class="hidden">
        <section class="hero-section">
            <div class="container mx-auto max-w-4xl px-6 text-center">
                <h2 id="artigo-titulo" class="text-4xl md:text-6xl font-black mb-8 leading-tight italic text-gray-900"></h2>
            </div>
        </section>

        <main class="container mx-auto max-w-4xl px-6 -mt-10">
            <div class="mb-12 img-container">
                <img id="artigo-imagem" src="" alt="Capa" class="w-full h-auto shadow-2xl rounded-sm object-cover max-h-[500px]">
            </div>
            
            <article id="artigo-texto" class="text-gray-800 text-xl md:text-2xl space-y-6 pb-10"></article>

            <div class="py-10 flex flex-col md:flex-row items-center justify-between gap-6 border-t border-b border-gray-100">
                <div class="text-gray-500 italic text-lg">Postado por <span class="font-bold text-gray-800">Jadir Brito</span></div>
                <button onclick="compartilharArtigo()" class="btn-share">Compartilhar Artigo</button>
            </div>
        </main>
    </div>

    <div id="foto-modal" onclick="this.style.display='none'">
        <img id="foto-grande" src="">
    </div>

    <section class="bg-gray-100 py-16 text-center mt-12">
        <div class="container mx-auto px-6">
            <h3 class="text-3xl font-bold mb-4 uppercase tracking-tighter">Minha Jornada de Fé</h3>
            <p class="text-lg text-gray-600 mb-8 max-w-xl mx-auto font-light">Oração à <b>meia-noite</b> e Devocional às <b>7h da manhã</b>.</p>
            <a href="https://www.youtube.com/@jadirbritooficial" target="_blank" class="inline-flex bg-red-600 text-white px-8 py-4 rounded-full font-bold uppercase text-xs">Inscreva-se e Oramos Juntos</a>
        </div>
    </section>

    <footer class="py-12">
        <div class="container mx-auto px-6 flex flex-col md:flex-row gap-12 items-center justify-between">
            <div class="text-center md:text-left">
                <h2 class="text-3xl font-black italic mb-2 tracking-tighter">JADIR BRITO</h2>
                <p class="text-xs text-gray-500 uppercase tracking-widest">© 2026 Todos os direitos reservados</p>
            </div>
            <div class="bg-white p-6 rounded shadow-2xl text-black w-full max-w-xs">
                <h4 class="text-sm font-bold mb-4 uppercase text-center text-gray-700">Pedido de Oração</h4>
                <input type="text" id="nome_oracao" class="input-footer" placeholder="Seu Nome">
                <textarea id="texto_oracao" rows="2" class="input-footer" placeholder="Seu motivo..."></textarea>
                <button onclick="enviarOracao()" class="btn-footer py-3 mt-2">Enviar via WhatsApp</button>
            </div>
        </div>
    </footer>

    <script src="conteudo.js"></script>
    <script>
        let currentSlide = 0;

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const lerId = urlParams.get('ler');

            if (typeof artigos === 'undefined' || artigos.length === 0) return;

            if (lerId) {
                const art = artigos.find(a => a.id === lerId) || artigos[0];
                exibirArtigo(art);
            } else {
                exibirHome();
            }
        };

        function exibirArtigo(art) {
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-artigo').classList.remove('hidden');
            document.getElementById('btn-voltar').classList.remove('hidden');
            
            document.getElementById('artigo-titulo').innerText = art.titulo;
            document.getElementById('artigo-imagem').src = art.imagemUrl;
            
            let htmlConteudo = art.texto.split('\n').filter(t => t.trim() !== '').map(p => `<p>${p}</p>`).join('');

            // Adiciona Banner Rotativo (se houver galeria)
            if (art.galeria && art.galeria.length > 0) {
                htmlConteudo += `
                    <div class="slider-container">
                        <div class="slider-track" id="sliderTrack">
                            ${art.galeria.map(img => `<div class="slide"><img src="${img}"></div>`).join('')}
                        </div>
                    </div>`;
                setInterval(moverSlider, 4000);
            }

            // Adiciona Mural Gigante (se houver mural)
            if (art.mural && art.mural.length > 0) {
                let muralHtml = `<div class="mural-grid">`;
                art.mural.forEach(foto => {
                    muralHtml += `<div class="mural-item" onclick="abrirFotoGrande('${foto}')"><img src="${foto}" loading="lazy"></div>`;
                });
                muralHtml += `</div>`;
                htmlConteudo += muralHtml;
            }

            document.getElementById('artigo-texto').innerHTML = htmlConteudo;
            document.title = art.titulo + " | Jadir Brito";
            window.scrollTo(0, 0);
        }

        function moverSlider() {
            const track = document.getElementById('sliderTrack');
            if (track) {
                const slides = track.querySelectorAll('.slide');
                currentSlide = (currentSlide + 1) % slides.length;
                track.style.transform = `translateX(-${currentSlide * 100}%)`;
            }
        }

        function abrirFotoGrande(src) {
            document.getElementById('foto-grande').src = src;
            document.getElementById('foto-modal').style.display = 'flex';
        }

        function exibirHome() {
            const homeView = document.getElementById('view-home');
            homeView.innerHTML = artigos.map(art => `
                <div class="card-home mb-12" onclick="window.location.search = '?ler=${art.id}'">
                    <div class="mb-6"><img src="${art.imagemUrl}" class="w-full h-auto shadow-lg rounded-sm object-cover max-h-[400px]"></div>
                    <h2 class="text-3xl md:text-5xl font-black mb-4 italic">${art.titulo}</h2>
                    <p class="resumo-texto text-xl">${art.texto.substring(0, 150)}...</p>
                    <span class="inline-block mt-4 text-sm font-bold uppercase border-b-2 border-black">Leia mais</span>
                </div>
            `).join('');
        }

        function compartilharArtigo() {
            if (navigator.share) navigator.share({ title: document.title, url: window.location.href });
        }

        function enviarOracao() {
            const nome = document.getElementById('nome_oracao').value;
            const pedido = document.getElementById('texto_oracao').value;
            if(nome && pedido) window.open(`https://wa.me/5547988233530?text=Olá Jadir, meu nome é ${nome}. Gostaria de pedir oração por: ${pedido}`, '_blank');
        }
    </script>
</body>
</html>
