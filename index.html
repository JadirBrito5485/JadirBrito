<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadir Brito | Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=Inter:wght@300;400;600;700&display=swap');
        body { background-color: #ffffff; font-family: 'Inter', sans-serif; color: #1a1a1a; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; letter-spacing: -0.02em; }
        header { background: #000000; color: white; }
        .card-home { transition: 0.3s; border-bottom: 1px solid #eee; padding-bottom: 2rem; cursor: pointer; }
        .card-home:hover { opacity: 0.8; }
        .resumo-texto { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .conteudo-completo { line-height: 1.8; font-size: 1.25rem; }
        .conteudo-completo strong { font-weight: 800; color: #000; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <header class="py-5 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <a href="#" onclick="mostrarHome()" class="text-xl font-black tracking-widest uppercase italic">JADIR BRITO</a>
            <button id="btn-voltar" onclick="mostrarHome()" class="hidden bg-white text-black px-4 py-1 rounded text-sm font-bold uppercase">← Voltar</button>
        </div>
    </header>

    <main id="main-content" class="container mx-auto max-w-4xl px-6 py-12">
        <div id="view-lista"></div>
        <div id="view-detalhe" class="hidden"></div>
    </main>

    <footer class="py-12 bg-black text-white text-center mt-auto">
        <p>© 2026 Jadir Brito</p>
    </footer>

    <script>
        // BANCO DE DADOS UNIFICADO
        const artigos = [
            {
                id: "mural-eventos",
                titulo: "PAI E FILHA - JADIR E TÁBITA",
                imagemUrl: "img/foto01.jpg", 
                resumo: "TE AMO MUITO - Um registro especial e eterno dedicado à minha filha Tábitá.",
                texto: `TE AMO MUITO`,
                mural: [
                    "img/foto01.jpg", 
                    "img/foto02.jpg", 
                    "img/foto03.jpg", 
                    "img/foto04.jpg", 
                    "img/foto05.jpg", 
                    "img/foto06.jpg", 
                    "img/foto07.jpg", 
                    "img/foto08.jpg"
                ]
            },
            {
                id: "estudo-roma-constantino",
                titulo: "Líderes em Roma até a Era de Constantino",
                imagemUrl: "https://i.pinimg.com/736x/42/f2/96/42f2961022d12e01344932ade1a36ca0.jpg", 
                resumo: "A história da liderança cristã em Roma, sob a ótica protestante, desde o apóstolo Pedro até o ano de 325 d.C.",
                texto: `A história da liderança cristã em Roma, sob a ótica protestante, é a narrativa de pastores e mártires, não de monarcas espirituais. Este artigo detalha os nomes que preservaram a fé desde o apóstolo Pedro até a ascensão de Constantino, quando a igreja deixou as catacumbas para entrar nos palácios.

**1. Pedro (Apóstolo):** Não é visto como Papa, mas como o apóstolo que, junto com Paulo, plantou a semente em Roma.
**2. Lino:** Um presbítero mencionado na Bíblia (2 Timóteo 4:21).
**3. Anacleto:** Líder durante a perseguição de Domiciano.
**4. Clemente I:** Sua carta aos Coríntios prova que o governo da igreja ainda era simples.
**5. Evaristo:** Liderou no início do século II.
**6. Alexandre I:** Liderou durante o reinado de Adriano.
**7. Sisto I:** Período de relativa paz.
**8. Telésforo:** Confirmadamente martirizado.
**9. Higino:** Organizou a hierarquia administrativa sem poder papal.
**10. Pio I:** Irmão de Hermas (autor de "O Pastor de Hermas").
**11. Aniceto:** Discutiu com Policarpo sobre a data da Páscoa.
**12. Soter:** Conhecido pela caridade organizacional.
**13. Eleutério:** Expansão para as fronteiras do Império.
**14. Vítor I:** Tentou impor a vontade de Roma, iniciando a centralização.
**15. Zeferino:** Enfrentou heresias sobre a Trindade.
**16. Calisto I:** Ex-escravo; enfrentou divisões internas.
**17. Urbano I:** Tempo de paz temporária.
**18. Ponciano:** Renunciou após condenação às minas.
**19. Antero:** Reinou por apenas 40 dias.
**20. Fabiano:** Morreu na perseguição de Décio.
**21. Cornélio:** Enfrentou o cisma sobre o perdão aos arrependidos.
**22. Lúcio I:** Banido logo após sua eleição.
**23. Estevão I:** Conflitos com Cipriano de Cartago.
**24. Sisto II:** Martirizado enquanto ensinava nas catacumbas.
**25. Dionísio:** Reorganizou a igreja.
**26. Félix I:** Cultos sobre túmulos de mártires.
**27. Eutiquiano:** Preocupação com o sepultamento de mártires.
**28. Caio:** Viveu tempos de tensões crescentes.
**29. Marcelino:** Período da grande perseguição de Diocleciano.
**30. Marcelo I:** Tentou reorganizar a igreja após o caos.
**31. Eusébio:** Exilado por questões de disciplina interna.
**32. Miltíades:** Viu a vitória de Constantino e o Edito de Milão.
**33. Silvestre I:** O Contemporâneo de Constantino no Concílio de Niceia (325 d.C.). Para muitos protestantes, este período marca a união perigosa entre Igreja e Estado.`
            },
            {
                id: "estudo-01",
                titulo: "Muitos, mas um escolhido",
                imagemUrl: "https://i.pinimg.com/1200x/60/d2/21/60d221c0263704061d18f837dfde82f3.jpg",
                resumo: "A soberania divina opera de maneira singular. Este estudo analisa como Deus seleciona pontos focais para manifestar Sua glória.",
                texto: `A soberania divina opera de maneira singular na história da humanidade. Este estudo foca na viúva de Sarepta e na ressurreição de Lázaro para mostrar que o tempo de Deus é individual e intencional.`
            }
        ];

        // FUNÇÃO PARA MOSTRAR A LISTA
        function mostrarHome() {
            document.getElementById('view-lista').classList.remove('hidden');
            document.getElementById('view-detalhe').classList.add('hidden');
            document.getElementById('btn-voltar').classList.add('hidden');
            
            const lista = document.getElementById('view-lista');
            lista.innerHTML = artigos.map(art => `
                <div onclick="lerArtigo('${art.id}')" class="card-home mb-12">
                    <div class="mb-6">
                        <img src="${art.imagemUrl}" class="w-full h-auto shadow-lg rounded-sm object-cover max-h-[400px]">
                    </div>
                    <h2 class="text-3xl md:text-5xl font-black mb-4 italic">${art.titulo}</h2>
                    <p class="resumo-texto text-xl text-gray-600">${art.resumo}</p>
                    <span class="inline-block mt-4 text-sm font-bold uppercase border-b-2 border-black">Leia mais</span>
                </div>
            `).join('');
            window.scrollTo(0,0);
        }

        // FUNÇÃO PARA LER O ARTIGO COMPLETO
        function lerArtigo(id) {
            const art = artigos.find(a => a.id === id);
            if(art) {
                const detalhe = document.getElementById('view-detalhe');
                const lista = document.getElementById('view-lista');
                const btnVoltar = document.getElementById('btn-voltar');

                lista.classList.add('hidden');
                detalhe.classList.remove('hidden');
                btnVoltar.classList.remove('hidden');

                let htmlContent = `
                    <img src="${art.imagemUrl}" class="w-full h-auto mb-8 shadow-xl">
                    <h1 class="text-4xl md:text-6xl font-black mb-8 italic leading-tight">${art.titulo}</h1>
                    <div class="conteudo-completo text-gray-800 whitespace-pre-wrap">${formatarTexto(art.texto)}</div>
                `;

                if(art.mural) {
                    htmlContent += `<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-12">`;
                    art.mural.forEach(img => {
                        htmlContent += `<img src="${img}" class="w-full h-40 object-cover rounded shadow-md">`;
                    });
                    htmlContent += `</div>`;
                }

                detalhe.innerHTML = htmlContent;
                window.scrollTo(0,0);
            }
        }

        // FUNÇÃO PARA DEIXAR O TEXTO EM NEGRITO ONDE TIVER **
        function formatarTexto(texto) {
            return texto.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        }

        // INICIALIZA O SITE
        window.onload = mostrarHome;
    </script>
</body>
</html>
